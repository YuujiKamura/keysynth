[package]
name = "keysynth"
version = "0.1.0"
edition = "2021"
description = "Real-time MIDI keyboard -> speaker synth (square / Karplus-Strong)."

[dependencies]
midir = "0.10"
cpal = "0.15"
ctrlc = "3.4"
eframe = { version = "0.29", default-features = false, features = ["default_fonts", "glow"] }
egui = "0.29"

# bench binary deps (SoundFont reference comparison harness)
rustysynth = "1.3"
hound = "3.5"

# analyse binary: STFT, harmonic decay, spectrogram PNG, JSON report
rustfft = "6"
image = { version = "0.25", default-features = false, features = ["png"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# render_midi binary: parse SMF (Standard MIDI File) and play through any engine.
midly = "0.5"

# jukebox binary: hand-rolled cpal mixer for sample-accurate A/B listening
# (issue #7 Stage 1). rodio dropped in favour of a direct cpal::Stream
# that sums N tracks per audio callback.

[profile.release]
opt-level = 3
lto = "thin"

[[bin]]
name = "keysynth"
path = "src/main.rs"

[[bin]]
name = "bench"
path = "src/bin/bench.rs"

[[bin]]
name = "analyse"
path = "src/bin/analyse.rs"

# cpubench binary: 32-voice sustained polyphony cost per engine.
# Tracks issue #2 per-voice CPU budget.
[[bin]]
name = "cpubench"
path = "src/bin/cpubench.rs"

# extract_dump binary: dump the issue #3 extractors' output for a WAV.
# Used to pin / re-pin golden values when an extractor's algorithm changes.
[[bin]]
name = "extract_dump"
path = "src/bin/extract_dump.rs"

# render_modal binary: modal-synthesis piano voice C4 pilot (issue #3 alt path).
# Extracts modes from a reference WAV via src/extract/* and renders them back
# through ModalPianoVoice (parallel bandpass resonator bank).
[[bin]]
name = "render_modal"
path = "src/bin/render_modal.rs"

# score binary: weighted multi-metric loss between a reference and a
# candidate WAV. Combines MR-STFT, T60 vector, onset envelope, centroid
# trajectory, and inharmonicity-coefficient residual into one scalar.
[[bin]]
name = "score"
path = "src/bin/score.rs"

# build_modal_lut binary: extract per-note modal LUT (decompose + t60 +
# attack) from SFZ Salamander reference WAVs. Output is consumed by
# voices::piano_modal::ModalPianoVoice (issue #3 A2 supervised path).
[[bin]]
name = "build_modal_lut"
path = "src/bin/build_modal_lut.rs"

# render_chord binary: render N-note chord through any engine for
# chord-level GT comparison. Single-note evaluation hides the polyphony
# stacking artifact, so chord-level renders are needed for issue #3
# realism evaluation.
[[bin]]
name = "render_chord"
path = "src/bin/render_chord.rs"

# render_song binary: render short multi-note phrases (chord
# progressions, melody+bass, two-voice imitation) through any engine
# for musical-context realism evaluation. Multi-event timeline
# scheduling, per-event velocity/duration.
[[bin]]
name = "render_song"
path = "src/bin/render_song.rs"

# render_midi binary: parse a Standard MIDI File (.mid) and render it
# through any keysynth engine. Lets us test against real human-played
# performances (piano-midi.de, Mutopia, Joplin piano rolls) instead of
# hand-coded note tuples that lack microtiming.
[[bin]]
name = "render_midi"
path = "src/bin/render_midi.rs"

# render_chiptune binary: parse a chiptune-lab song JSON
# (ai-chiptune-demo / listener-lab format) and render it through any
# keysynth engine. Lead+harm+bass become pitched voices; drums overlay
# via the rhythm-box module. Lets us listen to listener-lab's
# transcriptions through SFZ Salamander or PianoModal instead of the
# Web Audio NES synth.
[[bin]]
name = "render_chiptune"
path = "src/bin/render_chiptune.rs"

# jukebox binary: minimal egui WAV browser. Scans bench-out/iterH/ +
# bench-out/songs/ for *.wav, lists them as selectable rows, plays the
# selected one through the default audio output. For quick A/B listening
# of multiple engine renders without launching a media player per file.
[[bin]]
name = "jukebox"
path = "src/bin/jukebox.rs"

# seq_grid binary: standalone egui step-sequencer pattern grid (issue
# #7 Stage 6). Drives keysynth::sequencer::Pattern only — no Stage 1
# mixer integration, no piano-voice involvement. Exports wav via the
# existing drum synthesiser and plays it back through rodio. Save /
# load JSON in bench-out/PATTERNS/.
[[bin]]
name = "seq_grid"
path = "src/bin/seq_grid.rs"
